<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Photo Frame">
  <title>Photo Frame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000; color: #fff;
      font-family: -apple-system, Helvetica, Arial, sans-serif;
      height: 100vh; overflow: hidden;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      padding: 24px; text-align: center;
      transition: opacity 0.35s; z-index: 10;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* Token screen */
    #tokenScreen h1  { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    #tokenScreen p   { color: #888; font-size: 14px; margin-bottom: 24px; max-width: 340px; line-height: 1.6; }
    #tokenInput {
      width: 100%; max-width: 420px;
      background: #1c1c1e; border: 1px solid #333;
      color: #fff; padding: 12px 14px;
      border-radius: 8px; font-size: 13px;
      font-family: monospace;
      margin-bottom: 12px;
      -webkit-user-select: text; user-select: text;
    }
    #tokenInput:focus { outline: none; border-color: #1a73e8; }
    .btn-primary {
      background: #1a73e8; color: #fff;
      border: none; padding: 12px 28px;
      border-radius: 8px; font-size: 16px;
      font-weight: 600; cursor: pointer;
      width: 100%; max-width: 420px;
    }
    .btn-primary:active { opacity: 0.85; }
    #tokenScreen .note {
      font-size: 11px; color: #555;
      margin-top: 14px; max-width: 340px; line-height: 1.5;
    }

    /* Folder screen */
    #folderScreen {
      -webkit-justify-content: flex-start; justify-content: flex-start;
      padding-top: 44px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #folderScreen h2   { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    #folderScreen .hint { font-size: 13px; color: #666; margin-bottom: 20px; }
    #folderList { width: 100%; max-width: 520px; padding-bottom: 40px; }
    .folder-row {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 14px; padding: 14px 16px;
      background: #1c1c1e; border-radius: 10px;
      margin-bottom: 8px; cursor: pointer;
    }
    .folder-row:active { background: #2c2c2e; }
    .folder-icon  { font-size: 26px; -webkit-flex-shrink: 0; flex-shrink: 0; }
    .folder-name  { font-size: 16px; font-weight: 500; text-align: left; }
    .folder-count { font-size: 12px; color: #666; text-align: left; margin-top: 2px; }
    .root-row     { background: #0d2e4e; }

    /* Loading */
    #loadingScreen p { color: #888; font-size: 15px; margin-top: 14px; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #2a2a2a; border-top-color: #1a73e8;
      border-radius: 50%;
      -webkit-animation: spin 0.8s linear infinite;
      animation: spin 0.8s linear infinite;
    }
    @-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Slideshow */
    #slideshow {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; display: none; z-index: 5;
    }
    .slide {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      opacity: 0; transition: opacity 1.5s ease-in-out;
    }
    .slide.active { opacity: 1; }
    .slide img    { max-width: 100%; max-height: 100%; display: block; }
    .slide.cover img {
      -o-object-fit: cover; object-fit: cover;
      width: 100%; height: 100%;
    }

    /* Controls */
    #tapZone { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; }
    #controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: -webkit-linear-gradient(top, transparent, rgba(0,0,0,0.8));
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 40px 20px 22px;
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      -webkit-align-items: center; align-items: center;
      gap: 10px; z-index: 21;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #controls.visible { opacity: 1; pointer-events: auto; }
    .ctrl-btn {
      background: rgba(255,255,255,0.15); color: #fff;
      border: none; padding: 9px 18px; border-radius: 20px;
      font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.3); }

    /* Settings */
    #settingsPanel {
      position: absolute; bottom: 80px; left: 50%;
      -webkit-transform: translateX(-50%); transform: translateX(-50%);
      background: rgba(24,24,26,0.97); border-radius: 14px;
      padding: 18px 20px 14px; width: 260px; z-index: 30;
      display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }
    #settingsPanel.visible { display: block; }
    #settingsPanel h3 {
      font-size: 14px; font-weight: 600; margin-bottom: 14px;
      color: #aaa; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .s-row {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: space-between; justify-content: space-between;
      -webkit-align-items: center; align-items: center;
      margin-bottom: 12px; font-size: 14px; color: #ddd;
    }
    .s-row select {
      background: #3a3a3c; border: none; color: #fff;
      padding: 5px 10px; border-radius: 6px; font-size: 13px;
    }

    /* Counter & preload */
    #photoCounter {
      position: absolute; top: 14px; right: 14px;
      font-size: 12px; color: rgba(255,255,255,0.35);
      z-index: 22; opacity: 0; transition: opacity 0.3s;
    }
    #controls.visible ~ #photoCounter { opacity: 1; }
    #preloadBar {
      position: absolute; bottom: 0; left: 0;
      height: 2px; background: #1a73e8; width: 0%;
      transition: width 0.4s; z-index: 25; opacity: 0;
    }
    #preloadBar.visible { opacity: 1; }

    /* Error */
    #errorBanner {
      position: fixed; top: 20px; left: 50%;
      -webkit-transform: translateX(-50%); transform: translateX(-50%);
      background: #b71c1c; color: #fff;
      padding: 10px 20px; border-radius: 8px;
      font-size: 14px; z-index: 100; display: none;
      max-width: 88vw; text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>

<!-- Token entry -->
<div class="screen" id="tokenScreen">
  <h1>📷 Photo Frame</h1>
  <p>Enter your Dropbox access token to connect to your photos. It will be saved on this device.</p>
  <input type="password" id="tokenInput" placeholder="Paste your Dropbox access token here">
  <button class="btn-primary" id="btnConnect">Connect</button>
  <p class="note">Your token is stored only in this browser and is never sent anywhere except Dropbox.</p>
</div>

<!-- Loading -->
<div class="screen hidden" id="loadingScreen">
  <div class="spinner"></div>
  <p id="loadingMsg">Loading…</p>
</div>

<!-- Folder picker -->
<div class="screen hidden" id="folderScreen">
  <h2>Choose a Folder</h2>
  <p class="hint">Select a folder containing your photos</p>
  <div id="folderList"></div>
</div>

<!-- Slideshow -->
<div id="slideshow">
  <div id="slideA" class="slide"><img id="imgA" src="" alt=""></div>
  <div id="slideB" class="slide"><img id="imgB" src="" alt=""></div>
  <div id="tapZone"></div>
  <div id="controls">
    <button class="ctrl-btn" id="btnFolders">⬅ Folders</button>
    <button class="ctrl-btn" id="btnNext">⏭ Next</button>
    <button class="ctrl-btn" id="btnSettings">⚙ Settings</button>
  </div>
  <div id="settingsPanel">
    <h3>Settings</h3>
    <div class="s-row">
      <span>Interval</span>
      <select id="intervalSel">
        <option value="5000">5 sec</option>
        <option value="10000" selected>10 sec</option>
        <option value="30000">30 sec</option>
        <option value="60000">1 min</option>
        <option value="300000">5 min</option>
      </select>
    </div>
    <div class="s-row">
      <span>Order</span>
      <select id="orderSel">
        <option value="random" selected>Shuffle</option>
        <option value="sequential">Sequential</option>
      </select>
    </div>
    <div class="s-row">
      <span>Fit</span>
      <select id="fitSel">
        <option value="contain" selected>Fit (letterbox)</option>
        <option value="cover">Fill (crop)</option>
      </select>
    </div>
  </div>
  <div id="photoCounter"></div>
  <div id="preloadBar"></div>
</div>

<div id="errorBanner"></div>

<script>
var DBX_API     = 'https://api.dropboxapi.com/2';
var IMAGE_EXTS  = ['jpg','jpeg','png','gif','webp','bmp','tiff','tif','heic'];
var TOKEN_KEY   = 'pf_dbx_token';

// State
var state = {
  token:       null,
  photos:      [],   // [{name, path}]
  index:       0,
  activeSlide: 'A',
  timer:       null,
  ctrlTimer:   null,
  interval:    10000,
  fit:         'contain',
  order:       'random',
  skipCount:   0     // consecutive failures guard
};

// Temporary link cache: path -> {url, expiresAt}
var linkCache = {};

// ── NodeList shim (iOS 9) ──────────────────────
function each(list, fn) {
  for (var i = 0; i < list.length; i++) fn(list[i]);
}

// ── Boot ──────────────────────────────────────
window.onload = function() {
  document.getElementById('btnConnect').addEventListener('click', onConnect);
  document.getElementById('tokenInput').addEventListener('keydown', function(e) {
    if (e.keyCode === 13) onConnect();
  });
  document.getElementById('tapZone').addEventListener('click', handleTap);
  document.getElementById('btnFolders').addEventListener('click', goToFolders);
  document.getElementById('btnNext').addEventListener('click', skipPhoto);
  document.getElementById('btnSettings').addEventListener('click', toggleSettings);
  document.getElementById('intervalSel').addEventListener('change', applyInterval);
  document.getElementById('orderSel').addEventListener('change', applyOrder);
  document.getElementById('fitSel').addEventListener('change', applyFit);

  // Restore saved token
  var saved = null;
  try { saved = localStorage.getItem(TOKEN_KEY); } catch(e) {}
  if (saved) {
    state.token = saved;
    showScreen('loadingScreen');
    loadFolders('');
  } else {
    showScreen('tokenScreen');
  }
};

// ── Token ────────────────────────────────────
function onConnect() {
  var val = document.getElementById('tokenInput').value.trim();
  if (!val) { showError('Please paste your Dropbox token.'); return; }
  state.token = val;
  try { localStorage.setItem(TOKEN_KEY, val); } catch(e) {}
  showScreen('loadingScreen');
  loadFolders('');
}

function clearToken() {
  state.token = null;
  try { localStorage.removeItem(TOKEN_KEY); } catch(e) {}
  document.getElementById('tokenInput').value = '';
  showScreen('tokenScreen');
}

// ── API ───────────────────────────────────────
function dbxPost(endpoint, body) {
  return fetch(DBX_API + endpoint, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + state.token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  }).then(function(res) {
    if (res.status === 401) {
      clearToken();
      throw new Error('Token expired or invalid. Please enter a new token.');
    }
    if (!res.ok) {
      return res.text().then(function(t) { throw new Error('Dropbox error: ' + t); });
    }
    return res.json();
  });
}

// Fetch all entries with pagination
function listAll(path, accumulated) {
  accumulated = accumulated || [];
  return dbxPost('/files/list_folder', {
    path: path,
    recursive: false,
    include_media_info: false,
    include_deleted: false,
    include_has_explicit_shared_members: false
  }).then(function(res) {
    var all = accumulated.concat(res.entries || []);
    if (res.has_more) {
      return listAllContinue(res.cursor, all);
    }
    return all;
  });
}

function listAllContinue(cursor, accumulated) {
  return dbxPost('/files/list_folder/continue', { cursor: cursor })
    .then(function(res) {
      var all = accumulated.concat(res.entries || []);
      if (res.has_more) return listAllContinue(res.cursor, all);
      return all;
    });
}

// ── Folders ───────────────────────────────────
function loadFolders(path) {
  setLoading('Loading folders…');
  listAll(path).then(function(entries) {
    var folders = [];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i]['.tag'] === 'folder') folders.push(entries[i]);
    }
    renderFolders(path, folders);
  }).catch(function(e) {
    showError(e.message);
    if (e.message.indexOf('Token') !== -1) return;
    setTimeout(function() { showScreen('tokenScreen'); }, 3000);
  });
}

function renderFolders(currentPath, folders) {
  var list = document.getElementById('folderList');
  list.innerHTML = '';

  // "Use this folder" option — show photos directly in current folder
  var useRow = document.createElement('div');
  useRow.className = 'folder-row root-row';
  useRow.innerHTML = '<span class="folder-icon">▶️</span>'
    + '<div><div class="folder-name">Use this folder</div>'
    + '<div class="folder-count">Show all photos here</div></div>';
  useRow.addEventListener('click', function() { selectFolder(currentPath); });
  list.appendChild(useRow);

  // Subfolders
  for (var i = 0; i < folders.length; i++) {
    (function(f) {
      var row = document.createElement('div');
      row.className = 'folder-row';
      row.innerHTML = '<span class="folder-icon">📁</span>'
        + '<div><div class="folder-name">' + escHtml(f.name) + '</div>'
        + '<div class="folder-count">Tap to browse</div></div>';
      row.addEventListener('click', function() {
        showScreen('loadingScreen');
        loadFolders(f.path_lower);
      });
      list.appendChild(row);
    })(folders[i]);
  }

  if (!folders.length && currentPath === '') {
    list.innerHTML += '<p style="color:#555;font-size:13px;margin-top:12px;line-height:1.7">'
      + 'No subfolders found. Add photos to your Dropbox/Apps/Photo Frame +/ folder, '
      + 'then tap "Use this folder" above.</p>';
  }

  showScreen('folderScreen');
}

// ── Load Photos ───────────────────────────────
function selectFolder(path) {
  showScreen('loadingScreen');
  setLoading('Loading photos…');
  listAll(path).then(function(entries) {
    var photos = [];
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      if (e['.tag'] === 'file' && isImage(e.name)) {
        photos.push({ name: e.name, path: e.path_lower });
      }
    }
    if (!photos.length) {
      var list = document.getElementById('folderList');
      list.innerHTML = '<div style="background:#1c1c1e;border-radius:10px;padding:20px;color:#aaa;font-size:14px;line-height:1.8;text-align:left">'
        + '⚠️ <strong style="color:#fff">No photos found in this folder.</strong><br><br>'
        + 'Please add images to:<br>'
        + '<code style="color:#1a73e8">Dropbox/Apps/Photo Frame +/</code><br><br>'
        + 'Then come back and tap "Use this folder".'
        + '</div>';
      showScreen('folderScreen');
      return;
    }
    state.photos = photos;
    state.index  = 0;
    if (state.order === 'random') shuffle(state.photos);
    linkCache = {};
    startSlideshow();
  }).catch(function(e) {
    showError(e.message);
    setTimeout(function() { showScreen('folderScreen'); }, 3000);
  });
}

function isImage(name) {
  var ext = name.split('.').pop().toLowerCase();
  for (var i = 0; i < IMAGE_EXTS.length; i++) {
    if (IMAGE_EXTS[i] === ext) return true;
  }
  return false;
}

// ── Slideshow ─────────────────────────────────
function startSlideshow() {
  document.getElementById('slideshow').style.display = 'block';
  showScreen(null);
  advanceTo(state.index);
  scheduleNext();
}

function advanceTo(idx) {
  var photo = state.photos[idx];
  document.getElementById('photoCounter').textContent =
    (idx + 1) + ' / ' + state.photos.length;

  showPreloadBar(true);
  getTempLink(photo.path).then(function(url) {
    state.skipCount = 0;
    showPreloadBar(false);
    displaySlide(url);
    preloadAhead(idx, 2);
  }).catch(function(e) {
    showPreloadBar(false);
    state.skipCount++;
    console.warn('Skip ' + photo.name + ': ' + e.message);
    // If we've failed on every single photo, stop and show error
    if (state.skipCount >= state.photos.length) {
      state.skipCount = 0;
      clearTimeout(state.timer);
      document.getElementById('slideshow').style.display = 'none';
      showError('Could not load any photos. Your token may be missing the "files.content.read" permission. Please regenerate your token.');
      setTimeout(function() { clearToken(); }, 4000);
      return;
    }
    state.index = (idx + 1) % state.photos.length;
    advanceTo(state.index);
  });
}

function displaySlide(url) {
  var nextSlideId = state.activeSlide === 'A' ? 'slideB' : 'slideA';
  var currSlideId = state.activeSlide === 'A' ? 'slideA' : 'slideB';
  var nextImgId   = state.activeSlide === 'A' ? 'imgB'   : 'imgA';

  var nextSlide = document.getElementById(nextSlideId);
  var currSlide = document.getElementById(currSlideId);
  var nextImg   = document.getElementById(nextImgId);

  nextSlide.className = 'slide' + (state.fit === 'cover' ? ' cover' : '');
  nextImg.onload = function() {
    nextSlide.classList.add('active');
    currSlide.classList.remove('active');
    state.activeSlide = (nextSlideId === 'slideA') ? 'A' : 'B';
  };
  nextImg.onerror = function() {
    // Link may have expired — clear cache and retry once
    delete linkCache[state.photos[state.index].path];
    advanceTo(state.index);
  };
  nextImg.src = url;
}

function scheduleNext() {
  clearTimeout(state.timer);
  state.timer = setTimeout(function() {
    state.index = (state.index + 1) % state.photos.length;
    advanceTo(state.index);
    scheduleNext();
  }, state.interval);
}

function preloadAhead(fromIdx, count) {
  for (var i = 1; i <= count; i++) {
    (function(p) {
      if (!linkCache[p] || linkCache[p].expiresAt < Date.now() + 60000) {
        getTempLink(p).catch(function() {});
      }
    })(state.photos[(fromIdx + i) % state.photos.length].path);
  }
}

// ── Temp Link Cache ───────────────────────────
function getTempLink(path) {
  var cached = linkCache[path];
  // Reuse if valid for at least 10 more minutes
  if (cached && cached.expiresAt > Date.now() + 10 * 60 * 1000) {
    return Promise.resolve(cached.url);
  }
  return dbxPost('/files/get_temporary_link', { path: path })
    .then(function(res) {
      linkCache[path] = {
        url:       res.link,
        expiresAt: Date.now() + 4 * 60 * 60 * 1000  // 4 hours
      };
      return res.link;
    });
}

// ── Controls ──────────────────────────────────
function handleTap() {
  var ctrl = document.getElementById('controls');
  var sp   = document.getElementById('settingsPanel');
  sp.classList.remove('visible');
  if (ctrl.classList.contains('visible')) {
    ctrl.classList.remove('visible');
  } else {
    ctrl.classList.add('visible');
    clearTimeout(state.ctrlTimer);
    state.ctrlTimer = setTimeout(function() {
      ctrl.classList.remove('visible');
      sp.classList.remove('visible');
    }, 5000);
  }
}

function skipPhoto(e) {
  e.stopPropagation();
  clearTimeout(state.timer);
  state.index = (state.index + 1) % state.photos.length;
  advanceTo(state.index);
  scheduleNext();
}

function goToFolders(e) {
  e.stopPropagation();
  clearTimeout(state.timer);
  document.getElementById('slideshow').style.display = 'none';
  document.getElementById('slideA').classList.remove('active');
  document.getElementById('slideB').classList.remove('active');
  loadFolders('');
}

function toggleSettings(e) {
  e.stopPropagation();
  document.getElementById('settingsPanel').classList.toggle('visible');
}

function applyInterval() {
  state.interval = parseInt(document.getElementById('intervalSel').value);
  clearTimeout(state.timer);
  scheduleNext();
}

function applyFit() {
  state.fit = document.getElementById('fitSel').value;
  var active = (state.activeSlide === 'A') ? 'slideA' : 'slideB';
  document.getElementById(active).className =
    'slide active' + (state.fit === 'cover' ? ' cover' : '');
}

function applyOrder() {
  state.order = document.getElementById('orderSel').value;
  if (state.order === 'random') shuffle(state.photos);
  else state.photos.sort(function(a, b) { return a.name.localeCompare(b.name); });
  state.index = 0;
}

// ── Utilities ─────────────────────────────────
function showScreen(id) {
  each(document.querySelectorAll('.screen'), function(s) {
    if (id === null) s.classList.add('hidden');
    else { if (s.id === id) s.classList.remove('hidden'); else s.classList.add('hidden'); }
  });
}

function setLoading(msg) { document.getElementById('loadingMsg').textContent = msg; }

function showPreloadBar(on) {
  var bar = document.getElementById('preloadBar');
  if (on) { bar.style.width = '70%'; bar.classList.add('visible'); }
  else     { bar.style.width = '100%';
    setTimeout(function() { bar.classList.remove('visible'); bar.style.width = '0%'; }, 300); }
}

function showError(msg) {
  var b = document.getElementById('errorBanner');
  b.textContent = msg; b.style.display = 'block';
  setTimeout(function() { b.style.display = 'none'; }, 6000);
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
