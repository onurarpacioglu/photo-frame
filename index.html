  <title>Photo Frame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      background: #000; color: #fff;
      font-family: -apple-system, Helvetica, Arial, sans-serif;
      height: 100vh; overflow: hidden;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      padding: 24px; text-align: center;
      transition: opacity 0.35s; z-index: 10;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* Token screen */
    #tokenScreen h1  { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    #tokenScreen p   { color: #888; font-size: 14px; margin-bottom: 24px; max-width: 340px; line-height: 1.6; }
    #tokenInput {
      width: 100%; max-width: 420px;
      background: #1c1c1e; border: 1px solid #333;
      color: #fff; padding: 12px 14px;
      border-radius: 8px; font-size: 13px;
      font-family: monospace;
      margin-bottom: 12px;
      -webkit-user-select: text; user-select: text;
    }
    #tokenInput:focus { outline: none; border-color: #1a73e8; }
    .btn-primary {
      background: #1a73e8; color: #fff;
      border: none; padding: 12px 28px;
      border-radius: 8px; font-size: 16px;
      font-weight: 600; cursor: pointer;

    #tokenScreen .note {
      font-size: 11px; color: #555;

    #folderScreen {
      -webkit-justify-content: flex-start; justify-content: flex-start;

    #folderScreen h2   { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    #folderScreen .hint { font-size: 13px; color: #666; margin-bottom: 20px; }
    #folderList { width: 100%; max-width: 520px; padding-bottom: 40px; }
    .folder-row {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 14px; padding: 14px 16px;
      background: #1c1c1e; border-radius: 10px;
      margin-bottom: 8px; cursor: pointer;

    .root-row     { background: #0d2e4e; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #2a2a2a; border-top-color: #1a73e8;
      border-radius: 50%;
      -webkit-animation: spin 0.8s linear infinite;
      animation: spin 0.8s linear infinite;

    @-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
    @keyframes spin { to { transform: rotate(360deg); } }

      position: fixed; top: 0; left: 0; right: 0; bottom: 0;

    .slide {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;

    #tapZone { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; }
    #controls {

      font-size: 14px; z-index: 100; display: none;
      max-width: 88vw; text-align: center; line-height: 1.5;
    }
  </style>

var DBX_API     = 'https://api.dropboxapi.com/2';
var IMAGE_EXTS  = ['jpg','jpeg','png','gif','webp','bmp','tiff','tif','heic'];

// ── RC4 decryption (same algo as token-encryptor.html) ───
function rc4ksa(key) {
  var S = [];
  for (var i = 0; i < 256; i++) S[i] = i;
  var j = 0;
  for (var i = 0; i < 256; i++) {
    j = (j + S[i] + key[i % key.length]) & 0xFF;
    var t = S[i]; S[i] = S[j]; S[j] = t;
  }
  return S;
}

function rc4stream(S, length) {
  S = S.slice();
  var i = 0, j = 0;
  for (var d = 0; d < 256; d++) {
    i = (i + 1) & 0xFF; j = (j + S[i]) & 0xFF;
    var t = S[i]; S[i] = S[j]; S[j] = t;
  }
  var out = [];
  for (var k = 0; k < length; k++) {
    i = (i + 1) & 0xFF; j = (j + S[i]) & 0xFF;
    var t = S[i]; S[i] = S[j]; S[j] = t;
    out.push(S[(S[i] + S[j]) & 0xFF]);
  }
  return out;
}

function deriveKey(password, saltHex, iterations) {
  var key = [];
  for (var i = 0; i < password.length; i++) key.push(password.charCodeAt(i) & 0xFF);
  for (var i = 0; i < saltHex.length; i += 2) key.push(parseInt(saltHex.substr(i, 2), 16));
  for (var r = 0; r < iterations; r++) {
    var S = rc4ksa(key);
    key = S.slice(0, 64);
  }
  return key;
}

function decryptToken(encryptedData, password) {
  var parts = encryptedData.split(':');
  if (parts.length !== 3) return null;
  var iterations  = parseInt(parts[0]);
  var saltHex     = parts[1];
  var cipherHex   = parts[2];
  var key         = deriveKey(password, saltHex, iterations);
  var S           = rc4ksa(key);
  var cipherBytes = [];
  for (var i = 0; i < cipherHex.length; i += 2) cipherBytes.push(parseInt(cipherHex.substr(i, 2), 16));
  var ks          = rc4stream(S, cipherBytes.length);
  var plainBytes  = cipherBytes.map(function(b, i) { return b ^ ks[i]; });
  var result = '';
  for (var i = 0; i < plainBytes.length; i++) result += String.fromCharCode(plainBytes[i]);
  return result;
}

// ── Token ────────────────────────────────────
function onConnect() {
  var pass = document.getElementById('tokenInput').value;
  if (!pass) { showError('Please enter your password.'); return; }

  if (ENCRYPTED_TOKEN === 'PASTE_ENCRYPTED_TOKEN_HERE') {
    showError('No encrypted token set. Run token-encryptor.html first.');
    return;
  }

  var status = document.getElementById('unlockStatus');
  var btn    = document.getElementById('btnConnect');
  status.textContent = 'Unlocking…';
  btn.disabled = true;

  // Defer to allow UI to update before heavy computation
  setTimeout(function() {
    var token = decryptToken(ENCRYPTED_TOKEN, pass);
    btn.disabled = false;
    if (!token || token.indexOf('sl.') !== 0) {
      status.textContent = 'Wrong password. Try again.';
      document.getElementById('tokenInput').value = '';
      return;
    }
    status.textContent = ' ';
    state.token = token;
    showScreen('loadingScreen');
    loadFolders('');
  }, 50);
}

function clearToken() {
  state.token = null;
  document.getElementById('tokenInput').value = '';
  document.getElementById('unlockStatus').textContent = ' ';
  showScreen('tokenScreen');
}

// ── API ───────────────────────────────────────
function dbxPost(endpoint, body) {
  return fetch(DBX_API + endpoint, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + state.token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  }).then(function(res) {
    if (res.status === 401) {
      clearToken();
      throw new Error('Token expired or invalid. Please enter a new token.');
    }
    if (!res.ok) {
      return res.text().then(function(t) { throw new Error('Dropbox error: ' + t); });
    }
    return res.json();
  });
}

// Fetch all entries with pagination
function listAll(path, accumulated) {
  accumulated = accumulated || [];
  return dbxPost('/files/list_folder', {
    path: path,
    recursive: false,
    include_media_info: false,
    include_deleted: false,
    include_has_explicit_shared_members: false
  }).then(function(res) {
    var all = accumulated.concat(res.entries || []);
    if (res.has_more) {
      return listAllContinue(res.cursor, all);
    }
    return all;
  });
}

function listAllContinue(cursor, accumulated) {
  return dbxPost('/files/list_folder/continue', { cursor: cursor })
    .then(function(res) {
      var all = accumulated.concat(res.entries || []);
      if (res.has_more) return listAllContinue(res.cursor, all);
      return all;
    });
}

// ── Folders ───────────────────────────────────
function loadFolders(path) {
  setLoading('Loading folders…');
  listAll(path).then(function(entries) {
    var folders = [];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i]['.tag'] === 'folder') folders.push(entries[i]);
    }
    renderFolders(path, folders);
  }).catch(function(e) {
    showError(e.message);
    if (e.message.indexOf('Token') !== -1) return;
    setTimeout(function() { showScreen('tokenScreen'); }, 3000);
  });
}

function renderFolders(currentPath, folders) {
  var list = document.getElementById('folderList');
  list.innerHTML = '';

  // "Use this folder" option — show photos directly in current folder
  var useRow = document.createElement('div');
  useRow.className = 'folder-row root-row';
  useRow.innerHTML = '<span class="folder-icon">▶️</span>'
    + '<div><div class="folder-name">Use this folder</div>'
    + '<div class="folder-count">Show all photos here</div></div>';
  useRow.addEventListener('click', function() { selectFolder(currentPath); });
  list.appendChild(useRow);

  // Subfolders
  for (var i = 0; i < folders.length; i++) {
    (function(f) {
      var row = document.createElement('div');
      row.className = 'folder-row';
      row.innerHTML = '<span class="folder-icon">📁</span>'
        + '<div><div class="folder-name">' + escHtml(f.name) + '</div>'
        + '<div class="folder-count">Tap to browse</div></div>';
      row.addEventListener('click', function() {
        showScreen('loadingScreen');
        loadFolders(f.path_lower);
      });
      list.appendChild(row);
    })(folders[i]);
  }

  if (!folders.length && currentPath === '') {
    var msg = document.createElement('p');
    msg.style.cssText = 'color:#555;font-size:13px;margin-top:12px;line-height:1.7;text-align:center';
    msg.textContent = 'No subfolders found. Tap "Use this folder" above to show all photos.';
    list.appendChild(msg);
  }

  showScreen('folderScreen');
}

// ── Load Photos ───────────────────────────────
function selectFolder(path) {
  showScreen('loadingScreen');
  setLoading('Loading photos…');
  listAll(path).then(function(entries) {
    var photos = [];
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      if (e['.tag'] === 'file' && isImage(e.name)) {
        photos.push({ name: e.name, path: e.path_lower });
      }
    }
    if (!photos.length) {
      var list = document.getElementById('folderList');
      list.innerHTML = '<div style="background:#1c1c1e;border-radius:10px;padding:20px;color:#aaa;font-size:14px;line-height:1.8;text-align:left">'
        + '⚠️ <strong style="color:#fff">No photos found in this folder.</strong><br><br>'
        + 'Please add images to:<br>'
        + '<code style="color:#1a73e8">Dropbox/Apps/Photo Frame +/</code><br><br>'
        + 'Then come back and tap "Use this folder".'
        + '</div>';
      showScreen('folderScreen');
      return;
    }
    state.photos     = photos;
    state.index      = 0;
    state.skipCount  = 0;
    if (state.order === 'random') shuffle(state.photos);
    linkCache = {};
    startSlideshow();
  }).catch(function(e) {
    showError(e.message);
    setTimeout(function() { showScreen('folderScreen'); }, 3000);
  });
}

function isImage(name) {
  var ext = name.split('.').pop().toLowerCase();
  for (var i = 0; i < IMAGE_EXTS.length; i++) {
    if (IMAGE_EXTS[i] === ext) return true;
  }
  return false;
}

// ── Slideshow ─────────────────────────────────
function startSlideshow() {
  document.getElementById('slideshow').style.display = 'block';
  showScreen(null);
  advanceTo(state.index);
  scheduleNext();
}

function advanceTo(idx) {
  var photo = state.photos[idx];
  document.getElementById('photoCounter').textContent =
    (idx + 1) + ' / ' + state.photos.length;

  showPreloadBar(true);
  getTempLink(photo.path).then(function(url) {
    state.skipCount = 0;
    showPreloadBar(false);
    displaySlide(url);
    preloadAhead(idx, 2);
  }).catch(function(e) {
    showPreloadBar(false);
    state.skipCount++;
    console.warn('Skip ' + photo.name + ': ' + e.message);
    // If we've failed on every single photo, stop and show error
    if (state.skipCount >= state.photos.length) {
      state.skipCount = 0;
      clearTimeout(state.timer);
      document.getElementById('slideshow').style.display = 'none';
      showError('Could not load any photos. Your token may be missing the "files.content.read" permission. Please regenerate your token.');
      setTimeout(function() { clearToken(); }, 4000);
      return;
    }
    state.index = (idx + 1) % state.photos.length;
    advanceTo(state.index);
  });
}

function displaySlide(url) {
  var nextSlideId = state.activeSlide === 'A' ? 'slideB' : 'slideA';
  var currSlideId = state.activeSlide === 'A' ? 'slideA' : 'slideB';
  var nextImgId   = state.activeSlide === 'A' ? 'imgB'   : 'imgA';

  var nextSlide = document.getElementById(nextSlideId);
  var currSlide = document.getElementById(currSlideId);
  var nextImg   = document.getElementById(nextImgId);

  nextSlide.className = 'slide' + (state.fit === 'cover' ? ' cover' : '');
  nextImg.onload = function() {
    nextSlide.classList.add('active');
    currSlide.classList.remove('active');
    state.activeSlide = (nextSlideId === 'slideA') ? 'A' : 'B';
  };
  nextImg.onerror = function() {
    // Link may have expired — clear cache and retry once
    delete linkCache[state.photos[state.index].path];
    advanceTo(state.index);
  };
  nextImg.src = url;
}

function scheduleNext() {
  clearTimeout(state.timer);
  state.timer = setTimeout(function() {
    state.index = (state.index + 1) % state.photos.length;
    advanceTo(state.index);
    scheduleNext();
  }, state.interval);
}

function preloadAhead(fromIdx, count) {
  for (var i = 1; i <= count; i++) {
    (function(p) {
      if (!linkCache[p] || linkCache[p].expiresAt < Date.now() + 60000) {
        getTempLink(p).catch(function() {});
      }
    })(state.photos[(fromIdx + i) % state.photos.length].path);
  }
}

// ── Temp Link Cache ───────────────────────────
function getTempLink(path) {
  var cached = linkCache[path];
  // Reuse if valid for at least 10 more minutes
  if (cached && cached.expiresAt > Date.now() + 10 * 60 * 1000) {
    return Promise.resolve(cached.url);
  }
  return dbxPost('/files/get_temporary_link', { path: path })
    .then(function(res) {
      linkCache[path] = {
        url:       res.link,
        expiresAt: Date.now() + 4 * 60 * 60 * 1000  // 4 hours
      };
      return res.link;
    });
}

// ── Controls ──────────────────────────────────
function handleTap() {
  var ctrl = document.getElementById('controls');
  var sp   = document.getElementById('settingsPanel');
  sp.classList.remove('visible');
  if (ctrl.classList.contains('visible')) {
    ctrl.classList.remove('visible');
  } else {
    ctrl.classList.add('visible');
    clearTimeout(state.ctrlTimer);
    state.ctrlTimer = setTimeout(function() {
      ctrl.classList.remove('visible');
      sp.classList.remove('visible');
    }, 5000);
  }
}

function skipPhoto(e) {
  e.stopPropagation();
  clearTimeout(state.timer);
  state.index = (state.index + 1) % state.photos.length;
  advanceTo(state.index);
  scheduleNext();
}

function goToFolders(e) {
  e.stopPropagation();
  clearTimeout(state.timer);
  document.getElementById('slideshow').style.display = 'none';
  document.getElementById('slideA').classList.remove('active');
  document.getElementById('slideB').classList.remove('active');
  loadFolders('');
}

function toggleSettings(e) {
  e.stopPropagation();
  document.getElementById('settingsPanel').classList.toggle('visible');
}

function applyInterval() {
  state.interval = parseInt(document.getElementById('intervalSel').value);
  clearTimeout(state.timer);
  scheduleNext();
}

function applyFit() {
  state.fit = document.getElementById('fitSel').value;
  var active = (state.activeSlide === 'A') ? 'slideA' : 'slideB';
  document.getElementById(active).className =
    'slide active' + (state.fit === 'cover' ? ' cover' : '');
}

function applyOrder() {
  state.order = document.getElementById('orderSel').value;
  if (state.order === 'random') shuffle(state.photos);
  else state.photos.sort(function(a, b) { return a.name.localeCompare(b.name); });
  state.index = 0;
}

// ── Utilities ─────────────────────────────────
function showScreen(id) {
  each(document.querySelectorAll('.screen'), function(s) {
    if (id === null) s.classList.add('hidden');
    else { if (s.id === id) s.classList.remove('hidden'); else s.classList.add('hidden'); }
  });
}

function setLoading(msg) { document.getElementById('loadingMsg').textContent = msg; }

function showPreloadBar(on) {
  var bar = document.getElementById('preloadBar');
  if (on) { bar.style.width = '70%'; bar.classList.add('visible'); }
  else     { bar.style.width = '100%';
    setTimeout(function() { bar.classList.remove('visible'); bar.style.width = '0%'; }, 300); }
}

function showError(msg) {
  var b = document.getElementById('errorBanner');
  b.textContent = msg; b.style.display = 'block';
  setTimeout(function() { b.style.display = 'none'; }, 6000);
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
