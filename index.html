<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Photo Frame">
  <title>Photo Frame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000; color: #fff;
      font-family: -apple-system, Helvetica, Arial, sans-serif;
      height: 100vh; overflow: hidden;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      padding: 24px; text-align: center;
      transition: opacity 0.35s; z-index: 10;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* Token screen */
    #tokenScreen h1  { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    #tokenScreen p   { color: #888; font-size: 14px; margin-bottom: 24px; max-width: 340px; line-height: 1.6; }
    #tokenInput {
      width: 100%; max-width: 420px;
      background: #1c1c1e; border: 1px solid #333;
      color: #fff; padding: 12px 14px;
      border-radius: 8px; font-size: 13px; font-family: monospace;
      margin-bottom: 12px;
      -webkit-user-select: text; user-select: text;
    }
    #tokenInput:focus { outline: none; border-color: #1a73e8; }
    .btn-primary {
      background: #1a73e8; color: #fff; border: none;
      padding: 12px 28px; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      width: 100%; max-width: 420px;
    }
    .btn-primary:active { opacity: 0.85; }
    #tokenScreen .note { font-size: 11px; color: #555; margin-top: 14px; max-width: 340px; line-height: 1.5; }

    /* Folder screen */
    #folderScreen {
      -webkit-justify-content: flex-start; justify-content: flex-start;
      -webkit-align-items: center; align-items: center;
      padding: 36px 24px 88px; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #folderBack {
      -webkit-align-self: flex-start; align-self: flex-start;
      background: none; border: none; color: #1a73e8;
      font-size: 15px; padding: 0 0 10px; cursor: pointer; display: none;
    }
    #folderScreen h2   { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    #folderScreen .hint { font-size: 13px; color: #666; margin-bottom: 14px; }
    #patternRow {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 8px; width: 100%; max-width: 520px; margin-bottom: 10px;
    }
    #patternInput {
      -webkit-flex: 1; flex: 1;
      background: #1c1c1e; border: 1px solid #333; color: #fff;
      padding: 9px 12px; border-radius: 8px; font-size: 13px;
      -webkit-user-select: text; user-select: text;
    }
    #patternInput:focus { outline: none; border-color: #1a73e8; }
    #btnCheckPattern {
      background: #2c2c2e; color: #1a73e8; border: 1px solid #1a73e8;
      padding: 9px 12px; border-radius: 8px; font-size: 13px;
      cursor: pointer; white-space: nowrap;
    }
    #btnCheckPattern:active { background: #0d2e4e; }
    #folderActions {
      display: -webkit-flex; display: flex;
      gap: 8px; width: 100%; max-width: 520px; margin-bottom: 10px;
    }
    .btn-fol-action {
      -webkit-flex: 1; flex: 1;
      background: #2c2c2e; color: #aaa; border: none;
      padding: 8px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .btn-fol-action:active { background: #3c3c3e; }
    #folderList { width: 100%; max-width: 520px; padding-bottom: 4px; }
    .folder-row {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 12px; padding: 12px 14px;
      background: #1c1c1e; border-radius: 10px;
      margin-bottom: 8px; cursor: pointer;
      border: 2px solid transparent;
    }
    .folder-row:active { background: #2c2c2e; }
    .folder-row.checked { border-color: #1a73e8; background: #0d1e35; }
    .folder-row.highlighted { border-color: rgba(26,115,232,0.5); }
    .folder-check {
      width: 22px; height: 22px;
      -webkit-flex-shrink: 0; flex-shrink: 0;
      border: 2px solid #555; border-radius: 5px;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 700;
    }
    .folder-row.checked .folder-check { background: #1a73e8; border-color: #1a73e8; }
    .folder-info { -webkit-flex: 1; flex: 1; text-align: left; min-width: 0; }
    .folder-name  { font-size: 16px; font-weight: 500; }
    .folder-sub   { font-size: 12px; color: #666; margin-top: 2px; }
    .folder-drill {
      -webkit-flex-shrink: 0; flex-shrink: 0;
      background: rgba(255,255,255,0.08); border: none;
      color: #aaa; padding: 6px 10px; border-radius: 6px;
      font-size: 13px; cursor: pointer;
    }
    .folder-drill:active { background: rgba(255,255,255,0.2); }
    #startSlideshow {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a73e8; color: #fff; border: none;
      padding: 18px 24px; font-size: 16px; font-weight: 600;
      cursor: pointer; z-index: 15; display: none; text-align: center;
    }
    #startSlideshow.visible { display: block; }
    #startSlideshow:active { background: #1558b0; }

    /* Loading */
    #loadingScreen p { color: #888; font-size: 15px; margin-top: 14px; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #2a2a2a; border-top-color: #1a73e8; border-radius: 50%;
      -webkit-animation: spin 0.8s linear infinite; animation: spin 0.8s linear infinite;
    }
    @-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Slideshow */
    #slideshow { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: none; z-index: 5; }
    .slide {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      opacity: 0; transition: opacity 1.5s ease-in-out;
    }
    .slide.active { opacity: 1; }
    .slide img { max-width: 100%; max-height: 100%; display: block; }
    .slide.cover img { -o-object-fit: cover; object-fit: cover; width: 100%; height: 100%; }

    /* Clock */
    #clock {
      position: absolute; top: 16px; left: 18px;
      font-size: 44px; font-weight: 200; letter-spacing: -1px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      z-index: 22; display: none; pointer-events: none;
    }
    #clock.visible { display: block; }

    /* Photo info */
    #photoInfo {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 48px 18px 14px;
      background: -webkit-linear-gradient(top, transparent, rgba(0,0,0,0.78));
      background: linear-gradient(transparent, rgba(0,0,0,0.78));
      z-index: 22; display: none; pointer-events: none;
    }
    #photoInfo.visible { display: block; }
    #photoInfoName { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.95); }
    #photoInfoMeta { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 3px; }

    /* Controls */
    #tapZone { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; }
    #controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: -webkit-linear-gradient(top, transparent, rgba(0,0,0,0.8));
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 40px 20px 22px;
      display: -webkit-flex; display: flex;
      -webkit-justify-content: center; justify-content: center;
      -webkit-align-items: center; align-items: center;
      gap: 10px; z-index: 21;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #controls.visible { opacity: 1; pointer-events: auto; }
    .ctrl-btn {
      background: rgba(255,255,255,0.15); color: #fff;
      border: none; padding: 9px 18px; border-radius: 20px;
      font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.3); }

    /* Settings */
    #settingsPanel {
      position: absolute; bottom: 80px; left: 50%;
      -webkit-transform: translateX(-50%); transform: translateX(-50%);
      background: rgba(24,24,26,0.97); border-radius: 14px;
      padding: 16px 18px 12px; width: 300px; z-index: 30;
      display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      max-height: 65vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #settingsPanel.visible { display: block; }
    #settingsPanel h3 {
      font-size: 13px; font-weight: 600; margin-bottom: 12px;
      color: #aaa; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .s-section {
      font-size: 11px; color: #555; text-transform: uppercase;
      letter-spacing: 0.6px; margin: 12px 0 8px; padding-top: 8px;
      border-top: 1px solid #2c2c2e;
    }
    .s-row {
      display: -webkit-flex; display: flex;
      -webkit-justify-content: space-between; justify-content: space-between;
      -webkit-align-items: center; align-items: center;
      margin-bottom: 10px; font-size: 14px; color: #ddd;
    }
    .s-row select {
      background: #3a3a3c; border: none; color: #fff;
      padding: 5px 8px; border-radius: 6px; font-size: 13px; max-width: 140px;
    }
    .s-toggle {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 10px; margin-bottom: 10px; font-size: 14px; color: #ddd; cursor: pointer;
    }
    .s-toggle input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; }
    #refreshIntervalRow { display: none; }
    #refreshIntervalRow.active { display: -webkit-flex; display: flex; }
    .signout-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
    .btn-signout {
      width: 100%; background: rgba(255,69,58,0.12); color: #ff453a;
      border: none; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .btn-signout:active { background: rgba(255,69,58,0.25); }

    /* Counter & preload */
    #photoCounter {
      position: absolute; top: 14px; right: 14px;
      font-size: 12px; color: rgba(255,255,255,0.35);
      z-index: 22; opacity: 0; transition: opacity 0.3s;
    }
    #controls.visible ~ #photoCounter { opacity: 1; }
    #preloadBar {
      position: absolute; bottom: 0; left: 0;
      height: 2px; background: #1a73e8; width: 0%;
      transition: width 0.4s; z-index: 25; opacity: 0;
    }
    #preloadBar.visible { opacity: 1; }

    /* Error */
    #errorBanner {
      position: fixed; top: 20px; left: 50%;
      -webkit-transform: translateX(-50%); transform: translateX(-50%);
      background: #b71c1c; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; z-index: 100; display: none;
      max-width: 88vw; text-align: center; line-height: 1.5;
    }

    /* Remember me */
    .remember-row {
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      gap: 10px; margin-bottom: 16px; cursor: pointer;
      font-size: 14px; color: #aaa;
      -webkit-user-select: none; user-select: none;
    }
    .remember-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- Password entry -->
<div class="screen" id="tokenScreen">
  <h1>📷 Photo Frame</h1>
  <p>Enter your password to unlock your photos</p>
  <input type="password" id="tokenInput" placeholder="Password" style="text-align:center;font-size:20px;letter-spacing:3px">
  <label class="remember-row">
    <input type="checkbox" id="rememberMe">
    <span>Remember me on this device</span>
  </label>
  <button class="btn-primary" id="btnConnect">Unlock</button>
  <p class="note" id="unlockStatus">&nbsp;</p>
</div>

<!-- Loading -->
<div class="screen hidden" id="loadingScreen">
  <div class="spinner"></div>
  <p id="loadingMsg">Loading…</p>
</div>

<!-- Folder / album picker -->
<div class="screen hidden" id="folderScreen">
  <button id="folderBack">◀ Back</button>
  <h2>Select Albums</h2>
  <p class="hint">Tap to select, then start the slideshow</p>
  <div id="patternRow">
    <input type="text" id="patternInput" placeholder="Filter by name…" autocorrect="off" autocapitalize="none" spellcheck="false">
    <button id="btnCheckPattern">Check matching</button>
  </div>
  <div id="folderActions">
    <button class="btn-fol-action" id="btnSelAll">Select all</button>
    <button class="btn-fol-action" id="btnDeselAll">Deselect all</button>
  </div>
  <div id="folderList"></div>
  <button id="startSlideshow">Start Slideshow</button>
</div>

<!-- Slideshow -->
<div id="slideshow">
  <div id="slideA" class="slide"><img id="imgA" src="" alt=""></div>
  <div id="slideB" class="slide"><img id="imgB" src="" alt=""></div>
  <div id="clock"></div>
  <div id="photoInfo">
    <div id="photoInfoName"></div>
    <div id="photoInfoMeta"></div>
  </div>
  <div id="tapZone"></div>
  <div id="controls">
    <button class="ctrl-btn" id="btnFolders">⬅ Albums</button>
    <button class="ctrl-btn" id="btnNext">⏭ Next</button>
    <button class="ctrl-btn" id="btnSettings">⚙ Settings</button>
  </div>
  <div id="settingsPanel">
    <h3>Settings</h3>

    <div class="s-section" style="border-top:none;padding-top:0;margin-top:0">Display</div>
    <div class="s-row">
      <span>Fit</span>
      <select id="fitSel">
        <option value="contain" selected>Fit (letterbox)</option>
        <option value="cover">Fill (crop)</option>
      </select>
    </div>
    <label class="s-toggle"><input type="checkbox" id="showPortraitCb" checked><span>Portrait photos</span></label>
    <label class="s-toggle"><input type="checkbox" id="showLandscapeCb" checked><span>Landscape photos</span></label>
    <label class="s-toggle"><input type="checkbox" id="showClockCb"><span>Show clock</span></label>
    <label class="s-toggle"><input type="checkbox" id="showInfoCb"><span>Photo info</span></label>

    <div class="s-section">Timing</div>
    <div class="s-row">
      <span>Interval</span>
      <select id="intervalSel">
        <option value="5000">5 sec</option>
        <option value="10000" selected>10 sec</option>
        <option value="30000">30 sec</option>
        <option value="60000">1 min</option>
        <option value="300000">5 min</option>
      </select>
    </div>
    <label class="s-toggle"><input type="checkbox" id="autoRefreshCb"><span>Auto-refresh new photos</span></label>
    <div class="s-row" id="refreshIntervalRow">
      <span>Refresh every</span>
      <select id="refreshIntervalSel">
        <option value="300000">5 min</option>
        <option value="600000" selected>10 min</option>
        <option value="1800000">30 min</option>
      </select>
    </div>

    <div class="s-section">Order</div>
    <div class="s-row">
      <span>Base order</span>
      <select id="mediaOrderSel">
        <option value="random" selected>Random</option>
        <option value="oldest">Oldest first</option>
        <option value="newest">Newest first</option>
      </select>
    </div>
    <label class="s-toggle"><input type="checkbox" id="weightNewerCb"><span>Newer dates more frequent</span></label>
    <label class="s-toggle"><input type="checkbox" id="weightLessSeenCb"><span>Less seen more frequent</span></label>
    <div class="s-row">
      <span>Albums</span>
      <select id="albumOrderSel">
        <option value="interleaved" selected>Interleaved</option>
        <option value="sequential">Sequential</option>
      </select>
    </div>

    <div class="signout-row">
      <button class="btn-signout" id="btnSignOut">Sign Out &amp; Forget</button>
    </div>
  </div>
  <div id="photoCounter"></div>
  <div id="preloadBar"></div>
</div>

<div id="errorBanner"></div>

  var out = [];
  for (var k = 0; k < length; k++) {
    i = (i + 1) & 0xFF; j = (j + S[i]) & 0xFF;
    var t = S[i]; S[i] = S[j]; S[j] = t;
    out.push(S[(S[i] + S[j]) & 0xFF]);
  }
  return out;
}
function deriveKey(password, saltHex, iterations) {
  var key = [];
  for (var i = 0; i < password.length; i++) key.push(password.charCodeAt(i) & 0xFF);
  for (var i = 0; i < saltHex.length; i += 2) key.push(parseInt(saltHex.substr(i, 2), 16));
  for (var r = 0; r < iterations; r++) {
    var S = rc4ksa(key);
    key = S.slice(0, 64);
  }
  return key;
}
function decryptToken(encryptedData, password) {
  var parts = encryptedData.split(':');
  if (parts.length !== 3) return null;
  var iterations  = parseInt(parts[0]);
  var saltHex     = parts[1];
  var cipherHex   = parts[2];
  var key         = deriveKey(password, saltHex, iterations);
  var S           = rc4ksa(key);
  var cipherBytes = [];
  for (var i = 0; i < cipherHex.length; i += 2) cipherBytes.push(parseInt(cipherHex.substr(i, 2), 16));
  var ks          = rc4stream(S, cipherBytes.length);
  var plainBytes  = cipherBytes.map(function(b, i) { return b ^ ks[i]; });
  var result = '';
  for (var i = 0; i < plainBytes.length; i++) result += String.fromCharCode(plainBytes[i]);
  return result;
}

// ── Utilities ────────────────────────────────────────────
function each(list, fn) { for (var i = 0; i < list.length; i++) fn(list[i]); }

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isImage(name) {
  var ext = name.split('.').pop().toLowerCase();
  for (var i = 0; i < IMAGE_EXTS.length; i++) {
    if (IMAGE_EXTS[i] === ext) return true;
  }
  return false;
}

function parentPath(path) {
  if (!path) return null;
  var idx = path.lastIndexOf('/');
  if (idx <= 0) return '';
  return path.substring(0, idx);
}

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      interval:        state.interval,
      fit:             state.fit,
      mediaOrder:      state.mediaOrder,
      weightNewer:     state.weightNewer,
      weightLessSeen:  state.weightLessSeen,
      albumOrder:      state.albumOrder,
      showPortrait:    state.showPortrait,
      showLandscape:   state.showLandscape,
      showClock:       state.showClock,
      showPhotoInfo:   state.showPhotoInfo,
      autoRefresh:     state.autoRefresh,
      refreshInterval: state.refreshInterval
    }));
  } catch(e) {}
}

function loadSettings() {
  try {
    var raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s.interval)        state.interval        = s.interval;
    if (s.fit)             state.fit             = s.fit;
    if (s.mediaOrder)      state.mediaOrder      = s.mediaOrder;
    if (typeof s.weightNewer    === 'boolean') state.weightNewer    = s.weightNewer;
    if (typeof s.weightLessSeen === 'boolean') state.weightLessSeen = s.weightLessSeen;
    if (s.albumOrder)      state.albumOrder      = s.albumOrder;
    if (typeof s.showPortrait  === 'boolean') state.showPortrait  = s.showPortrait;
    if (typeof s.showLandscape === 'boolean') state.showLandscape = s.showLandscape;
    if (typeof s.showClock     === 'boolean') state.showClock     = s.showClock;
    if (typeof s.showPhotoInfo === 'boolean') state.showPhotoInfo = s.showPhotoInfo;
    if (typeof s.autoRefresh   === 'boolean') state.autoRefresh   = s.autoRefresh;
    if (s.refreshInterval) state.refreshInterval = s.refreshInterval;
  } catch(e) {}
}

// ── View history ─────────────────────────────────────────
function loadViewHistory() {
  try {
    var raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function recordView(path) {
  try {
    var h = loadViewHistory();
    h[path] = Date.now();
    var keys = Object.keys(h);
    if (keys.length > 500) {
      keys.sort(function(a,b){ return h[a] - h[b]; });
      for (var i = 0; i < keys.length - 500; i++) delete h[keys[i]];
    }
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  } catch(e) {}
}

// ── Token ────────────────────────────────────────────────
function tryAutoConnect() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved && saved.indexOf('sl.') === 0) {
    state.token = saved;
    setLoading('Connecting…');
    showScreen('loadingScreen');
    loadFolders('');
  } else {
    showScreen('tokenScreen');
  }
}

function signOut() {
  document.getElementById('settingsPanel').classList.remove('visible');
  document.getElementById('controls').classList.remove('visible');
  clearToken();
}

function onConnect() {
  var pass = document.getElementById('tokenInput').value;
  if (!pass) { showError('Please enter your password.'); return; }
  if (ENCRYPTED_TOKEN === 'PASTE_ENCRYPTED_TOKEN_HERE') {
    showError('No encrypted token set. Run token-encryptor.html first.');
    return;
  }
  var status = document.getElementById('unlockStatus');
  var btn    = document.getElementById('btnConnect');
  status.textContent = 'Unlocking…';
  btn.disabled = true;
  setTimeout(function() {
    var token = decryptToken(ENCRYPTED_TOKEN, pass);
    btn.disabled = false;
    if (!token || token.indexOf('sl.') !== 0) {
      status.textContent = 'Wrong password. Try again.';
      document.getElementById('tokenInput').value = '';
      return;
    }
    status.textContent = ' ';
    state.token = token;
    if (document.getElementById('rememberMe').checked) {
      localStorage.setItem(STORAGE_KEY, token);
    }
    showScreen('loadingScreen');
    loadFolders('');
  }, 50);
}

function clearToken() {
  state.token = null;
  state.selectedPaths = [];
  state.browsePath = '';
  state.allPhotos = [];
  state.photos = [];
  clearTimeout(state.timer);
  clearInterval(state.refreshTimer);
  clearInterval(state.clockTimer);
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('slideshow').style.display = 'none';
  document.getElementById('slideA').classList.remove('active');
  document.getElementById('slideB').classList.remove('active');
  document.getElementById('clock').classList.remove('visible');
  document.getElementById('photoInfo').classList.remove('visible');
  document.getElementById('startSlideshow').classList.remove('visible');
  document.getElementById('tokenInput').value = '';
  document.getElementById('unlockStatus').textContent = ' ';
  showScreen('tokenScreen');
}

// ── Dropbox API ──────────────────────────────────────────
function dbxPost(endpoint, body) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', DBX_API + endpoint, true);
    xhr.setRequestHeader('Authorization', 'Bearer ' + state.token);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 30000;
    xhr.onload = function() {
      if (xhr.status === 401) {
        clearToken();
        reject(new Error('Wrong password or token expired. Please try again.'));
        return;
      }
      if (xhr.status < 200 || xhr.status >= 300) {
        reject(new Error('Dropbox error ' + xhr.status + ': ' + xhr.responseText));
        return;
      }
      try { resolve(JSON.parse(xhr.responseText)); }
      catch(e) { reject(new Error('Invalid response from Dropbox')); }
    };
    xhr.onerror   = function() { reject(new Error('Network error — cannot reach Dropbox.')); };
    xhr.ontimeout = function() { reject(new Error('Timed out — Dropbox API unreachable.')); };
    xhr.send(JSON.stringify(body));
  });
}

function listAll(path, accumulated) {
  accumulated = accumulated || [];
  return dbxPost('/files/list_folder', {
    path: path,
    recursive: false,
    include_media_info: true,
    include_deleted: false,
    include_has_explicit_shared_members: false
  }).then(function(res) {
    var all = accumulated.concat(res.entries || []);
    if (res.has_more) return listAllContinue(res.cursor, all);
    return all;
  });
}

function listAllContinue(cursor, accumulated) {
  return dbxPost('/files/list_folder/continue', { cursor: cursor })
    .then(function(res) {
      var all = accumulated.concat(res.entries || []);
      if (res.has_more) return listAllContinue(res.cursor, all);
      return all;
    });
}

// ── Folder browser ───────────────────────────────────────
function loadFolders(path) {
  state.browsePath = path;
  setLoading('Loading folders…');
  listAll(path).then(function(entries) {
    var folders = [];
    for (var i = 0; i < entries.length; i++) {
      if (entries[i]['.tag'] === 'folder') folders.push(entries[i]);
    }
    renderFolders(path, folders);
  }).catch(function(e) {
    showError(e.message);
    if (e.message.indexOf('Token') !== -1) return;
    setTimeout(function() { showScreen('folderScreen'); }, 3000);
  });
}

function renderFolders(browsePath, folders) {
  var list = document.getElementById('folderList');
  list.innerHTML = '';

  document.getElementById('folderBack').style.display = browsePath ? 'block' : 'none';

  // Current folder row (to use photos directly here)
  var currentName = browsePath === '' ? 'Root folder' : browsePath.split('/').pop();
  list.appendChild(makeFolderRow(browsePath, currentName, '📂 Photos in this folder', false));

  // Subfolder rows
  for (var i = 0; i < folders.length; i++) {
    (function(f) {
      list.appendChild(makeFolderRow(f.path_lower, f.name, '📁 Subfolder', true));
    })(folders[i]);
  }

  if (!folders.length && browsePath === '') {
    var msg = document.createElement('p');
    msg.style.cssText = 'color:#555;font-size:13px;margin-top:12px;line-height:1.7;text-align:center';
    msg.textContent = 'No subfolders found. Select "Root folder" above to use all photos.';
    list.appendChild(msg);
  }

  updateStartButton();
  showScreen('folderScreen');
}

function makeFolderRow(path, name, subtitle, isDrillable) {
  var isChecked = state.selectedPaths.indexOf(path) !== -1;
  var row = document.createElement('div');
  row.className = 'folder-row' + (isChecked ? ' checked' : '');
  row.setAttribute('data-path', path);

  var check = document.createElement('div');
  check.className = 'folder-check';
  check.textContent = isChecked ? '✓' : '';

  var info = document.createElement('div');
  info.className = 'folder-info';
  var nameEl = document.createElement('div');
  nameEl.className = 'folder-name';
  nameEl.textContent = name;
  var subEl = document.createElement('div');
  subEl.className = 'folder-sub';
  subEl.textContent = subtitle;
  info.appendChild(nameEl);
  info.appendChild(subEl);

  row.appendChild(check);
  row.appendChild(info);

  if (isDrillable) {
    var drill = document.createElement('button');
    drill.className = 'folder-drill';
    drill.textContent = '▶';
    drill.addEventListener('click', function(e) {
      e.stopPropagation();
      showScreen('loadingScreen');
      loadFolders(path);
    });
    row.appendChild(drill);
  }

  row.addEventListener('click', function() {
    var idx = state.selectedPaths.indexOf(path);
    if (idx === -1) {
      state.selectedPaths.push(path);
      row.classList.add('checked');
      check.textContent = '✓';
    } else {
      state.selectedPaths.splice(idx, 1);
      row.classList.remove('checked');
      check.textContent = '';
    }
    updateStartButton();
  });

  return row;
}

function updateStartButton() {
  var btn = document.getElementById('startSlideshow');
  var n = state.selectedPaths.length;
  if (n > 0) {
    btn.textContent = 'Start Slideshow (' + n + ' album' + (n > 1 ? 's' : '') + ')';
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

function applyPattern() {
  var raw = document.getElementById('patternInput').value.trim().toLowerCase();
  if (!raw) return;
  var rows = document.querySelectorAll('#folderList .folder-row');
  var matched = 0;
  each(rows, function(row) {
    var nameEl = row.querySelector('.folder-name');
    if (!nameEl) return;
    var name = nameEl.textContent.toLowerCase();
    var path = row.getAttribute('data-path');
    if (path === null) return;
    var matches = patternMatch(raw, name);
    if (matches && state.selectedPaths.indexOf(path) === -1) {
      state.selectedPaths.push(path);
      row.classList.add('checked');
      var ck = row.querySelector('.folder-check');
      if (ck) ck.textContent = '✓';
      matched++;
    }
  });
  updateStartButton();
  if (matched === 0) showError('No unselected albums match "' + raw + '"');
}

function patternMatch(pattern, str) {
  if (pattern.indexOf('*') === -1) return str.indexOf(pattern) !== -1;
  var parts = pattern.split('*');
  var pos = 0;
  for (var i = 0; i < parts.length; i++) {
    if (!parts[i]) continue;
    var found = str.indexOf(parts[i], pos);
    if (found === -1) return false;
    pos = found + parts[i].length;
  }
  return true;
}

function selectAllVisible() {
  var rows = document.querySelectorAll('#folderList .folder-row');
  each(rows, function(row) {
    var path = row.getAttribute('data-path');
    if (path !== null && state.selectedPaths.indexOf(path) === -1) {
      state.selectedPaths.push(path);
      row.classList.add('checked');
      var ck = row.querySelector('.folder-check');
      if (ck) ck.textContent = '✓';
    }
  });
  updateStartButton();
}

function deselectAll() {
  state.selectedPaths = [];
  var rows = document.querySelectorAll('#folderList .folder-row');
  each(rows, function(row) {
    row.classList.remove('checked');
    var ck = row.querySelector('.folder-check');
    if (ck) ck.textContent = '';
  });
  updateStartButton();
}

// ── Load Photos ──────────────────────────────────────────
function startFromSelected() {
  if (!state.selectedPaths.length) return;
  showScreen('loadingScreen');
  setLoading('Loading photos…');

  var promises = [];
  for (var i = 0; i < state.selectedPaths.length; i++) {
    promises.push(loadPhotosFromPath(state.selectedPaths[i]));
  }

  Promise.all(promises).then(function(albumResults) {
    var allPhotos;

    if (state.albumOrder === 'sequential') {
      allPhotos = [];
      for (var i = 0; i < albumResults.length; i++) {
        var sorted = sortPhotos(albumResults[i]);
        for (var j = 0; j < sorted.length; j++) allPhotos.push(sorted[j]);
      }
    } else {
      allPhotos = [];
      for (var i = 0; i < albumResults.length; i++) {
        for (var j = 0; j < albumResults[i].length; j++) allPhotos.push(albumResults[i][j]);
      }
      allPhotos = sortPhotos(allPhotos);
    }

    if (!allPhotos.length) {
      showError('No photos found in the selected albums.');
      showScreen('folderScreen');
      return;
    }

    state.allPhotos  = allPhotos;
    state.photos     = filterByOrientation(allPhotos);
    state.index      = 0;
    state.skipCount  = 0;
    linkCache        = {};
    startSlideshow();
  }).catch(function(e) {
    showError(e.message);
    setTimeout(function() { showScreen('folderScreen'); }, 3000);
  });
}

function loadPhotosFromPath(path) {
  var albumName = path === '' ? 'Root' : path.split('/').pop();
  return listAll(path).then(function(entries) {
    var photos = [];
    for (var i = 0; i < entries.length; i++) {
      var e = entries[i];
      if (e['.tag'] !== 'file' || !isImage(e.name)) continue;
      var timeTaken = null, w = 0, h = 0;
      if (e.media_info && e.media_info['.tag'] === 'metadata' && e.media_info.metadata) {
        var meta = e.media_info.metadata;
        if (meta.time_taken) timeTaken = meta.time_taken;
        if (meta.dimensions) { w = meta.dimensions.width || 0; h = meta.dimensions.height || 0; }
      }
      photos.push({ name: e.name, path: e.path_lower, timeTaken: timeTaken, width: w, height: h, albumName: albumName });
    }
    return photos;
  });
}

function sortPhotos(photos) {
  if (state.mediaOrder === 'oldest') {
    return photos.slice().sort(function(a, b) {
      var ta = a.timeTaken ? new Date(a.timeTaken).getTime() : 0;
      var tb = b.timeTaken ? new Date(b.timeTaken).getTime() : 0;
      return ta - tb;
    });
  }
  if (state.mediaOrder === 'newest') {
    return photos.slice().sort(function(a, b) {
      var ta = a.timeTaken ? new Date(a.timeTaken).getTime() : 0;
      var tb = b.timeTaken ? new Date(b.timeTaken).getTime() : 0;
      return tb - ta;
    });
  }
  var arr = photos.slice();
  shuffle(arr);
  return arr;
}

function filterByOrientation(photos) {
  if (state.showPortrait && state.showLandscape) return photos.slice();
  var result = [];
  for (var i = 0; i < photos.length; i++) {
    var p = photos[i];
    if (p.width > 0 && p.height > 0) {
      var isPortrait = p.height >= p.width;
      if (isPortrait  && state.showPortrait)  result.push(p);
      if (!isPortrait && state.showLandscape) result.push(p);
    } else {
      result.push(p); // no dimension info: include by default
    }
  }
  return result.length ? result : photos.slice();
}

function reapplyOrientationFilter() {
  if (!state.allPhotos.length) return;
  var filtered = filterByOrientation(state.allPhotos);
  if (state.index >= filtered.length) state.index = 0;
  state.photos = filtered;
}

// ── Slideshow ────────────────────────────────────────────
function startSlideshow() {
  document.getElementById('slideshow').style.display = 'block';
  document.getElementById('startSlideshow').classList.remove('visible');
  showScreen(null);
  startClock();
  startAutoRefresh();
  advanceTo(state.index);
  scheduleNext();
}

function advanceTo(idx) {
  var photo = state.photos[idx];
  document.getElementById('photoCounter').textContent = (idx + 1) + ' / ' + state.photos.length;
  showPreloadBar(true);
  getTempLink(photo.path).then(function(url) {
    state.skipCount = 0;
    showPreloadBar(false);
    displaySlide(url);
    updatePhotoInfo(photo);
    recordView(photo.path);
    preloadAhead(idx, 2);
  }).catch(function(e) {
    showPreloadBar(false);
    state.skipCount++;
    console.warn('Skip ' + photo.name + ': ' + e.message);
    if (state.skipCount >= state.photos.length) {
      state.skipCount = 0;
      clearTimeout(state.timer);
      document.getElementById('slideshow').style.display = 'none';
      showError('Could not load any photos. Your token may lack "files.content.read" permission.');
      setTimeout(function() { clearToken(); }, 4000);
      return;
    }
    state.index = (idx + 1) % state.photos.length;
    advanceTo(state.index);
  });
}

function displaySlide(url) {
  var nextSlideId = state.activeSlide === 'A' ? 'slideB' : 'slideA';
  var currSlideId = state.activeSlide === 'A' ? 'slideA' : 'slideB';
  var nextImgId   = state.activeSlide === 'A' ? 'imgB'   : 'imgA';

  var nextSlide = document.getElementById(nextSlideId);
  var currSlide = document.getElementById(currSlideId);
  var nextImg   = document.getElementById(nextImgId);

  nextSlide.className = 'slide' + (state.fit === 'cover' ? ' cover' : '');
  nextImg.onload = function() {
    nextSlide.classList.add('active');
    currSlide.classList.remove('active');
    state.activeSlide = (nextSlideId === 'slideA') ? 'A' : 'B';
  };
  nextImg.onerror = function() {
    delete linkCache[state.photos[state.index].path];
    advanceTo(state.index);
  };
  nextImg.src = url;
}

function scheduleNext() {
  clearTimeout(state.timer);
  state.timer = setTimeout(function() {
    state.index = pickNextIndex();
    advanceTo(state.index);
    scheduleNext();
  }, state.interval);
}

function pickNextIndex() {
  if (!state.weightNewer && !state.weightLessSeen) {
    return (state.index + 1) % state.photos.length;
  }
  var now     = Date.now();
  var today   = new Date();
  var history = loadViewHistory();
  var weights = [];
  var total   = 0;

  for (var i = 0; i < state.photos.length; i++) {
    var w = 1.0;
    var p = state.photos[i];

    if (state.weightNewer && p.timeTaken) {
      var diff = calendarDayDiff(today, new Date(p.timeTaken));
      if (diff <= 7)  w *= 5;
      else if (diff <= 30) w *= 3;
    }

    if (state.weightLessSeen) {
      var lastSeen = history[p.path] || 0;
      var age = now - lastSeen;
      if (age < 86400000)       w *= 0.1;  // <1 day
      else if (age < 604800000) w *= 0.5;  // <7 days
    }

    if (i === state.index) w *= 0.01;
    weights.push(w);
    total += w;
  }

  var rand = Math.random() * total;
  var cum  = 0;
  for (var i = 0; i < weights.length; i++) {
    cum += weights[i];
    if (rand < cum) return i;
  }
  return (state.index + 1) % state.photos.length;
}

function calendarDayDiff(d1, d2) {
  var y1 = d1.getFullYear(), y2 = d2.getFullYear();
  var doy1 = Math.round((d1 - new Date(y1, 0, 0)) / 86400000);
  var doy2 = Math.round((d2 - new Date(y2, 0, 0)) / 86400000);
  var diff = Math.abs(doy1 - doy2);
  return diff > 182 ? 365 - diff : diff;
}

function preloadAhead(fromIdx, count) {
  for (var i = 1; i <= count; i++) {
    (function(p) {
      if (!linkCache[p] || linkCache[p].expiresAt < Date.now() + 60000) {
        getTempLink(p).catch(function() {});
      }
    })(state.photos[(fromIdx + i) % state.photos.length].path);
  }
}

function getTempLink(path) {
  var cached = linkCache[path];
  if (cached && cached.expiresAt > Date.now() + 10 * 60 * 1000) {
    return Promise.resolve(cached.url);
  }
  return dbxPost('/files/get_temporary_link', { path: path })
    .then(function(res) {
      linkCache[path] = { url: res.link, expiresAt: Date.now() + 4 * 60 * 60 * 1000 };
      return res.link;
    });
}

// ── Clock ────────────────────────────────────────────────
function startClock() {
  clearInterval(state.clockTimer);
  var el = document.getElementById('clock');
  if (!state.showClock) { el.classList.remove('visible'); return; }
  el.classList.add('visible');
  updateClock();
  state.clockTimer = setInterval(updateClock, 1000);
}

function updateClock() {
  var d = new Date();
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clock').textContent = h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
}

// ── Photo info ───────────────────────────────────────────
function updatePhotoInfo(photo) {
  var el = document.getElementById('photoInfo');
  if (!state.showPhotoInfo) { el.classList.remove('visible'); return; }
  el.classList.add('visible');
  document.getElementById('photoInfoName').textContent = photo.name.replace(/\.[^.]+$/, '');
  var meta = '';
  if (photo.timeTaken) {
    meta = new Date(photo.timeTaken).toLocaleDateString();
    if (photo.albumName) meta += ' · ' + photo.albumName;
  } else if (photo.albumName) {
    meta = photo.albumName;
  }
  document.getElementById('photoInfoMeta').textContent = meta;
}

// ── Auto-refresh ─────────────────────────────────────────
function startAutoRefresh() {
  clearInterval(state.refreshTimer);
  if (!state.autoRefresh || !state.selectedPaths.length) return;
  state.refreshTimer = setInterval(refreshPhotos, state.refreshInterval);
}

function refreshPhotos() {
  var promises = [];
  for (var i = 0; i < state.selectedPaths.length; i++) {
    promises.push(loadPhotosFromPath(state.selectedPaths[i]));
  }
  Promise.all(promises).then(function(albumResults) {
    var existing = {};
    for (var i = 0; i < state.allPhotos.length; i++) existing[state.allPhotos[i].path] = true;
    var added = 0;
    for (var i = 0; i < albumResults.length; i++) {
      for (var j = 0; j < albumResults[i].length; j++) {
        var p = albumResults[i][j];
        if (!existing[p.path]) {
          state.allPhotos.push(p);
          state.photos.push(p);
          added++;
        }
      }
    }
    if (added) console.log('Auto-refresh: added ' + added + ' photo(s)');
  }).catch(function() {});
}

// ── Controls ─────────────────────────────────────────────
function handleTap() {
  var ctrl = document.getElementById('controls');
  var sp   = document.getElementById('settingsPanel');
  sp.classList.remove('visible');
  if (ctrl.classList.contains('visible')) {
    ctrl.classList.remove('visible');
  } else {
    ctrl.classList.add('visible');
    clearTimeout(state.ctrlTimer);
    state.ctrlTimer = setTimeout(function() {
      ctrl.classList.remove('visible');
      sp.classList.remove('visible');
    }, 5000);
  }
}

function skipPhoto(e) {
  e.stopPropagation();
  clearTimeout(state.timer);
  state.index = (state.index + 1) % state.photos.length;
  advanceTo(state.index);
  scheduleNext();
}

function goToFolders(e) {
  e.stopPropagation();
  clearTimeout(state.timer);
  clearInterval(state.refreshTimer);
  document.getElementById('slideshow').style.display = 'none';
  document.getElementById('slideA').classList.remove('active');
  document.getElementById('slideB').classList.remove('active');
  loadFolders('');
}

function toggleSettings(e) {
  e.stopPropagation();
  var sp = document.getElementById('settingsPanel');
  if (!sp.classList.contains('visible')) syncSettingsUI();
  sp.classList.toggle('visible');
}

// ── Settings apply ───────────────────────────────────────
function applyInterval() {
  state.interval = parseInt(document.getElementById('intervalSel').value);
  clearTimeout(state.timer);
  scheduleNext();
  saveSettings();
}

function applyFit() {
  state.fit = document.getElementById('fitSel').value;
  var active = (state.activeSlide === 'A') ? 'slideA' : 'slideB';
  document.getElementById(active).className = 'slide active' + (state.fit === 'cover' ? ' cover' : '');
  saveSettings();
}

function applyMediaOrder() {
  state.mediaOrder = document.getElementById('mediaOrderSel').value;
  saveSettings();
}

function applyAlbumOrder() {
  state.albumOrder = document.getElementById('albumOrderSel').value;
  saveSettings();
}

function applyWeightNewer() {
  state.weightNewer = document.getElementById('weightNewerCb').checked;
  saveSettings();
}

function applyWeightLessSeen() {
  state.weightLessSeen = document.getElementById('weightLessSeenCb').checked;
  saveSettings();
}

function applyShowPortrait() {
  var newVal = document.getElementById('showPortraitCb').checked;
  if (!newVal && !state.showLandscape) {
    document.getElementById('showPortraitCb').checked = true;
    showError('At least one orientation must be shown.');
    return;
  }
  state.showPortrait = newVal;
  reapplyOrientationFilter();
  saveSettings();
}

function applyShowLandscape() {
  var newVal = document.getElementById('showLandscapeCb').checked;
  if (!newVal && !state.showPortrait) {
    document.getElementById('showLandscapeCb').checked = true;
    showError('At least one orientation must be shown.');
    return;
  }
  state.showLandscape = newVal;
  reapplyOrientationFilter();
  saveSettings();
}

function applyShowClock() {
  state.showClock = document.getElementById('showClockCb').checked;
  startClock();
  saveSettings();
}

function applyShowPhotoInfo() {
  state.showPhotoInfo = document.getElementById('showInfoCb').checked;
  if (!state.showPhotoInfo) document.getElementById('photoInfo').classList.remove('visible');
  else if (state.photos.length) updatePhotoInfo(state.photos[state.index]);
  saveSettings();
}

function applyAutoRefresh() {
  state.autoRefresh = document.getElementById('autoRefreshCb').checked;
  document.getElementById('refreshIntervalRow').className = 's-row' + (state.autoRefresh ? ' active' : '');
  startAutoRefresh();
  saveSettings();
}

function applyRefreshInterval() {
  state.refreshInterval = parseInt(document.getElementById('refreshIntervalSel').value);
  startAutoRefresh();
  saveSettings();
}

// ── Screen / UI helpers ──────────────────────────────────
function showScreen(id) {
  each(document.querySelectorAll('.screen'), function(s) {
    if (id === null) s.classList.add('hidden');
    else { if (s.id === id) s.classList.remove('hidden'); else s.classList.add('hidden'); }
  });
}

function setLoading(msg) { document.getElementById('loadingMsg').textContent = msg; }

function showPreloadBar(on) {
  var bar = document.getElementById('preloadBar');
  if (on) { bar.style.width = '70%'; bar.classList.add('visible'); }
  else {
    bar.style.width = '100%';
    setTimeout(function() { bar.classList.remove('visible'); bar.style.width = '0%'; }, 300);
  }
}

function showError(msg) {
  var b = document.getElementById('errorBanner');
  b.textContent = msg; b.style.display = 'block';
  setTimeout(function() { b.style.display = 'none'; }, 6000);
}
</script>
